name: PR Comment Agent

on:
  issue_comment:
    types: [created]

jobs:
  agent:
    # PR 코멘트에만 반응 (issue 코멘트 제외)
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code with comment
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          claude \
            --allowedTools "Edit,Write,Bash,Glob,Grep,Read" \
            --max-turns 30 \
            -p "PR #${PR_NUMBER}에 @${COMMENT_USER}가 다음 코멘트를 남겼다. 요청사항을 분석하고 필요한 코드 수정을 수행해라.

          코멘트 내용:
          ${COMMENT_BODY}

          수정 완료 후 변경사항이 있으면 git add와 git commit까지 수행해라.
          커밋 메시지는 프로젝트 컨벤션(docs/conventions/git.md)을 따른다."

      - name: Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git push origin HEAD

      - name: Post reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
